version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-120}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5174}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    image: nginx:1.25-alpine
    ports:
      - "5174:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Optional TLS termination via Caddy ──────────────────────
  # Uncomment and set DOMAIN= to get automatic Let's Encrypt TLS
